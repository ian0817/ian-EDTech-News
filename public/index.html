<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" href="/favicon.ico" type="image/x-icon">
  <title>ian's EdTech News</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #0a0a0a;
      color: #e0e0e0;
      min-height: 100vh;
    }

    /* Header */
    .header {
      background: #111;
      border-bottom: 1px solid #222;
      padding: 16px 24px;
      display: flex;
      align-items: center;
      gap: 16px;
      position: sticky;
      top: 0;
      z-index: 10;
    }
    .header h1 {
      font-size: 20px;
      font-weight: 700;
      color: #fff;
      white-space: nowrap;
    }
    .header h1 span { color: #4f9cf7; }
    .header h1 a { color: inherit; text-decoration: none; }
    .nav {
      display: flex;
      gap: 6px;
      margin-left: auto;
      flex-shrink: 0;
      align-items: center;
    }
    .nav a {
      padding: 6px 14px;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 600;
      color: #aaa;
      text-decoration: none;
      transition: all .2s;
    }
    .nav a:hover { color: #fff; background: #1a1a1a; }
    .nav a.active { color: #4f9cf7; background: #1a2a3a; }
    .nav-soon {
      padding: 6px 14px;
      font-size: 13px;
      font-weight: 600;
      color: #555;
      cursor: default;
    }
    .search-box {
      flex: 1;
      max-width: 500px;
      display: flex;
      gap: 8px;
    }
    .search-box input {
      flex: 1;
      padding: 8px 14px;
      border: 1px solid #333;
      border-radius: 6px;
      background: #1a1a1a;
      color: #e0e0e0;
      font-size: 14px;
      outline: none;
    }
    .search-box input:focus { border-color: #4f9cf7; }
    .search-box button {
      padding: 8px 18px;
      background: #4f9cf7;
      color: #fff;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 14px;
      font-weight: 600;
    }
    .search-box button:hover { background: #3a8ae5; }
    .search-box button:disabled { background: #555; cursor: wait; }

    /* Mini avatar in header (hidden initially) */
    .header-avatar {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      border: 2px solid #4f9cf7;
      object-fit: cover;
      display: none;
      flex-shrink: 0;
    }
    .header-avatar.visible { display: block; }

    /* Quick tags */
    .tags {
      padding: 10px 24px;
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      align-items: center;
      background: #0e0e0e;
      border-bottom: 1px solid #1a1a1a;
      position: sticky;
      top: 56px;
      z-index: 9;
    }
    .tag-group-label {
      font-size: 11px;
      color: #555;
      margin-right: 2px;
      white-space: nowrap;
    }
    .tag-group-label:not(:first-child) {
      margin-left: 10px;
      padding-left: 10px;
      border-left: 1px solid #2a2a2a;
    }
    .tag {
      padding: 4px 12px;
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      border-radius: 14px;
      font-size: 12px;
      color: #aaa;
      cursor: pointer;
      transition: all .2s;
    }
    .tag:hover { background: #252525; color: #fff; border-color: #4f9cf7; }
    .tag.active { background: #1a2a3a; color: #4f9cf7; border-color: #4f9cf7; }
    .tag.award { border-color: #3a3020; color: #c9a84c; }
    .tag.award:hover { background: #2a2518; border-color: #c9a84c; color: #f0d060; }
    .tag.award.active { background: #2a2518; border-color: #c9a84c; color: #f0d060; }

    /* Welcome / Landing */
    .welcome {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 60px 24px 40px;
      text-align: center;
      animation: fadeIn .6s ease;
    }
    .welcome.hidden { display: none; }
    .welcome-avatar {
      width: 180px;
      height: 180px;
      border-radius: 50%;
      border: 3px solid #4f9cf7;
      object-fit: cover;
      margin-bottom: 24px;
      box-shadow: 0 0 30px rgba(79, 156, 247, 0.2);
    }
    .welcome h2 {
      font-size: 22px;
      color: #fff;
      margin-bottom: 10px;
    }
    .welcome h2 span { color: #4f9cf7; }
    .welcome p {
      font-size: 14px;
      color: #888;
      margin-bottom: 8px;
      line-height: 1.6;
    }
    .welcome .hint {
      margin-top: 16px;
      display: flex;
      align-items: center;
      gap: 6px;
      color: #4f9cf7;
      font-size: 13px;
      animation: pulse 2s infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* Editorial */
    .editorial {
      max-width: 800px;
      margin: 0 auto;
      padding: 0 24px 20px;
      animation: fadeIn .6s ease;
    }
    .editorial.hidden { display: none; }
    .editorial-card {
      background: #1e1e1e;
      border: 1px solid #333;
      border-radius: 12px;
      padding: 28px 28px 22px;
      position: relative;
      overflow: hidden;
    }
    .editorial-card:hover { border-color: #4f9cf7; }
    .editorial-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 3px;
      background: linear-gradient(90deg, #4f9cf7, #9c4ff7, #f7854f);
    }
    .editorial-label {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 11px;
      font-weight: 700;
      color: #4f9cf7;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      margin-bottom: 14px;
    }
    .editorial-label .dot {
      width: 6px; height: 6px;
      background: #4f9cf7;
      border-radius: 50%;
      animation: pulse 2s infinite;
    }
    .editorial-title {
      font-size: 20px;
      font-weight: 800;
      color: #fff;
      line-height: 1.4;
      margin-bottom: 16px;
    }
    .editorial-body {
      font-size: 15px;
      color: #bbb;
      line-height: 1.8;
      white-space: pre-line;
    }
    .editorial-meta {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-top: 18px;
      padding-top: 14px;
      border-top: 1px solid #1a1a1a;
    }
    .editorial-author {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .editorial-author img {
      width: 28px; height: 28px;
      border-radius: 50%;
      border: 1.5px solid #4f9cf7;
      object-fit: cover;
    }
    .editorial-author-name {
      font-size: 13px;
      font-weight: 600;
      color: #eee;
    }
    .editorial-author-role {
      font-size: 11px;
      color: #666;
    }
    .editorial-time {
      font-size: 12px;
      color: #555;
      margin-left: auto;
    }
    .editorial-sources {
      margin-top: 14px;
      padding-top: 12px;
      border-top: 1px solid #1a1a1a;
    }
    .editorial-sources-title {
      font-size: 11px;
      color: #555;
      margin-bottom: 6px;
      font-weight: 600;
    }
    .editorial-sources a {
      display: block;
      font-size: 12px;
      color: #666;
      text-decoration: none;
      padding: 2px 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .editorial-sources a:hover { color: #4f9cf7; }
    .editorial-reflection {
      margin-top: 16px;
      padding: 16px 20px;
      background: #1a1a2a;
      border: 1px solid #2a2a3a;
      border-left: 3px solid #9c4ff7;
      border-radius: 8px;
    }
    .editorial-reflection-label {
      font-size: 11px;
      font-weight: 700;
      color: #9c4ff7;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 8px;
    }
    .editorial-reflection-text {
      font-size: 15px;
      color: #ddd;
      line-height: 1.6;
      font-style: italic;
    }
    .editorial-loading {
      text-align: center;
      padding: 40px;
      color: #555;
      font-size: 14px;
    }
    .editorial-history-toggle {
      text-align: center;
      margin-top: 14px;
      cursor: pointer;
      font-size: 13px;
      color: #555;
      transition: color .2s;
      user-select: none;
    }
    .editorial-history-toggle:hover { color: #4f9cf7; }

    /* Editorial history dialog */
    .eh-dialog {
      background: #1e1e1e;
      border: 1px solid #333;
      border-radius: 14px;
      color: #e0e0e0;
      padding: 0;
      width: min(560px, 92vw);
      max-height: 80vh;
      overflow: hidden;
      box-shadow: 0 20px 60px rgba(0,0,0,.6);
      margin: auto;
    }
    .eh-dialog::backdrop { background: rgba(0,0,0,.65); }
    .eh-dialog-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 18px 22px; border-bottom: 1px solid #222;
      position: sticky; top: 0; background: #1e1e1e; z-index: 1;
    }
    .eh-dialog-title { font-size: 16px; font-weight: 700; color: #fff; }
    .eh-dialog-close {
      background: none; border: none; color: #555; font-size: 20px;
      cursor: pointer; padding: 4px 8px; border-radius: 6px;
      transition: all .2s; line-height: 1;
    }
    .eh-dialog-close:hover { color: #fff; background: #222; }
    .eh-dialog-body { overflow-y: auto; max-height: calc(80vh - 60px); }

    /* List view */
    .eh-list { padding: 8px 12px; }
    .eh-list-item {
      display: flex; align-items: center; gap: 12px;
      padding: 14px 16px; border-radius: 8px;
      cursor: pointer; transition: background .15s;
    }
    .eh-list-item:hover { background: #1a1a1a; }
    .eh-list-item .eh-date {
      flex-shrink: 0; font-size: 12px; color: #555;
      font-variant-numeric: tabular-nums; white-space: nowrap;
    }
    .eh-list-item .eh-title {
      font-size: 14px; font-weight: 600; color: #ddd;
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }
    .eh-list-item .eh-arrow { flex-shrink: 0; color: #444; font-size: 12px; margin-left: auto; }
    .eh-list-sep {
      height: 1px; background: #1a1a1a; margin: 0 16px;
    }

    /* Detail view */
    .eh-detail { padding: 22px; }
    .eh-back {
      display: inline-flex; align-items: center; gap: 6px;
      font-size: 13px; color: #4f9cf7; cursor: pointer;
      margin-bottom: 16px; padding: 4px 0;
      background: none; border: none; transition: opacity .2s;
    }
    .eh-back:hover { opacity: .7; }
    .eh-detail-title { font-size: 18px; font-weight: 700; color: #fff; margin-bottom: 6px; }
    .eh-detail-date { font-size: 12px; color: #555; margin-bottom: 18px; }
    .eh-detail-body {
      font-size: 14px; color: #ccc; line-height: 1.8;
      white-space: pre-line; margin-bottom: 18px;
    }
    .eh-detail-reflection {
      background: #1a1a2a; border-left: 3px solid #4f9cf7;
      border-radius: 0 8px 8px 0; padding: 14px 16px;
      margin-bottom: 16px;
    }
    .eh-detail-reflection-label { font-size: 11px; font-weight: 700; color: #4f9cf7; margin-bottom: 6px; }
    .eh-detail-reflection-text { font-size: 13px; color: #9cb3d6; line-height: 1.6; }
    .eh-detail-sources { margin-top: 16px; }
    .eh-detail-sources-title { font-size: 11px; font-weight: 700; color: #555; margin-bottom: 8px; }
    .eh-detail-sources a {
      display: block; font-size: 12px; color: #888;
      text-decoration: none; padding: 3px 0;
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }
    .eh-detail-sources a:hover { color: #4f9cf7; }

    /* Status bar */
    .status {
      padding: 10px 24px;
      font-size: 13px;
      color: #666;
    }
    .status.loading { color: #4f9cf7; }

    /* Article grid */
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
      gap: 16px;
      padding: 16px 24px;
    }

    /* Card */
    .card {
      background: #1e1e1e;
      border: 1px solid #333;
      border-radius: 10px;
      padding: 18px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      transition: border-color .2s;
    }
    .card:hover { border-color: #4f9cf7; }
    .card-meta {
      display: flex;
      justify-content: space-between;
      font-size: 12px;
      color: #666;
    }
    .card-source {
      background: #1e2a3a;
      color: #4f9cf7;
      padding: 3px 10px;
      border-radius: 4px;
      font-size: 12px;
      font-weight: 600;
    }
    .card-title {
      font-size: 15px;
      font-weight: 600;
      color: #eee;
      line-height: 1.4;
    }
    .card-title a {
      color: inherit;
      text-decoration: none;
    }
    .card-title a:hover { color: #4f9cf7; }
    .card-snippet {
      font-size: 13px;
      color: #888;
      line-height: 1.5;
    }

    /* Exam preview */
    .exam-preview {
      max-width: 800px;
      margin: 0 auto;
      padding: 0 24px 30px;
    }
    .exam-preview.hidden { display: none; }
    .exam-preview-title {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 14px;
    }
    .exam-preview-title h3 {
      font-size: 15px;
      font-weight: 700;
      color: #888;
    }
    .exam-preview-title a {
      font-size: 12px;
      color: #4f9cf7;
      text-decoration: none;
    }
    .exam-preview-title a:hover { text-decoration: underline; }
    .exam-preview-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(230px, 1fr));
      gap: 10px;
    }
    .exam-mini {
      background: #1e1e1e;
      border: 1px solid #333;
      border-left: 3px solid var(--cat-color, #4f9cf7);
      border-radius: 8px;
      padding: 14px 16px;
      cursor: pointer;
      transition: border-color .2s;
    }
    .exam-mini:hover { border-color: #4f9cf7; border-left-color: var(--cat-color, #4f9cf7); }
    .exam-mini-name {
      font-size: 14px;
      font-weight: 600;
      color: #eee;
      margin-bottom: 6px;
    }
    .exam-mini-date {
      font-size: 12px;
      color: #888;
      margin-bottom: 6px;
    }
    .exam-mini-countdown {
      display: flex;
      align-items: baseline;
      gap: 4px;
    }
    .exam-mini-countdown .days {
      font-size: 22px;
      font-weight: 800;
      font-variant-numeric: tabular-nums;
    }
    .exam-mini-countdown .days.urgent { color: #f74f4f; }
    .exam-mini-countdown .days.soon { color: #f7d74f; }
    .exam-mini-countdown .days.normal { color: #4f9cf7; }
    .exam-mini-countdown .unit {
      font-size: 12px;
      color: #666;
    }
    .exam-mini-badge {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 4px;
      font-size: 10px;
      font-weight: 700;
      margin-top: 6px;
    }
    .mini-badge-open { background: #2a2a1a; color: #f7d74f; }
    .mini-badge-exam { background: #2a1a1a; color: #f74f4f; }

    /* Empty state */
    .empty {
      text-align: center;
      padding: 60px 24px;
      color: #555;
      font-size: 15px;
    }

    /* Footer */
    .footer {
      text-align: center;
      padding: 24px;
      margin-top: 40px;
      border-top: 1px solid #222;
      color: #555;
      font-size: 13px;
    }
    @media (max-width: 600px) {
      .header { flex-wrap: wrap; }
      .nav { width: 100%; justify-content: center; }
    }
  </style>
</head>
<body>
  <div class="header">
    <h1><a href="/">ian's <span>EdTech</span></a></h1>
    <div class="search-box" style="display:none;">
      <input type="text" id="searchInput" placeholder="搜尋教育科技新聞..." value="數位學習 教育科技">
      <button id="searchBtn" onclick="doSearch()">搜尋</button>
    </div>
    <nav class="nav">
      <a href="/" class="active">新聞</a>
      <a href="/calendar.html">考試行事曆</a>
      <a href="/conferences.html">學術活動</a>
      <a href="/learn.html">新靈感</a>
      <span class="nav-soon">教育應用 coming soon</span>
    </nav>
    <img src="/avatar.jpg" alt="Ian" class="header-avatar" id="headerAvatar">
  </div>
  <div class="tags">
    <span class="tag-group-label">趨勢</span>
    <span class="tag" onclick="quickSearch('數位學習',this)">數位學習</span>
    <span class="tag" onclick="quickSearch('教育科技 EdTech',this)">EdTech</span>
    <span class="tag" onclick="quickSearch('AI 教育',this)">AI 教育</span>
    <span class="tag" onclick="quickSearch('線上課程 平台',this)">線上課程</span>
    <span class="tag" onclick="quickSearch('教育部 數位',this)">教育政策</span>
    <span class="tag" onclick="quickSearch('自主學習',this)">自主學習</span>
    <span class="tag" onclick="quickSearch('教育 AI 生成式',this)">生成式 AI</span>
    <span class="tag" onclick="quickSearch('遠距教學',this)">遠距教學</span>
    <span class="tag-group-label">獎項</span>
    <span class="tag award" onclick="quickSearch('教育 科技 獎項 得獎 創新',this)">EdTech 得獎</span>
  </div>

  <!-- Welcome screen (shown before any search) -->
  <div class="welcome" id="welcome">
    <img src="/avatar.jpg" alt="Ian" class="welcome-avatar">
    <h2>Hi, I'm <span>Ian</span></h2>
    <p>歡迎來到我的教育科技新聞平台</p>
    <p>AI 即時爬取 + 智慧摘要，掌握數位學習最新動態</p>
    <div class="hint">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M7 11l5-5 5 5"/><path d="M7 17l5-5 5 5"/></svg>
      點擊上方標籤或輸入關鍵字開始探索
    </div>
  </div>

  <!-- Editorial -->
  <div class="editorial" id="editorial">
    <div class="editorial-loading">主編正在撰寫今日評論...</div>
  </div>

  <!-- Exam preview on homepage -->
  <div class="exam-preview" id="examPreview">
    <div class="exam-preview-title">
      <h3>近期考試</h3>
      <a href="/calendar.html">查看完整行事曆 &rarr;</a>
    </div>
    <div class="exam-preview-grid" id="examPreviewGrid"></div>
  </div>

  <div class="status" id="status"></div>
  <div class="grid" id="grid"></div>
  <div class="empty" id="empty" style="display:none">找不到相關新聞</div>
  <!-- Editorial History Dialog -->
  <dialog id="ehDialog" class="eh-dialog" onclick="if(event.target===this)this.close()">
    <div class="eh-dialog-header">
      <span class="eh-dialog-title">過往評論</span>
      <button class="eh-dialog-close" onclick="document.getElementById('ehDialog').close()">&times;</button>
    </div>
    <div class="eh-dialog-body"></div>
  </dialog>

  <div class="footer">新創小任 2026 · <a href="https://vercel.com/ian0817s-projects/ian-edtech-news/analytics" target="_blank" rel="noopener" style="color:#4f9cf7;text-decoration:none;">Analytics</a> · <span id="appVersion"></span></div>

  <script>
    const grid = document.getElementById('grid');
    const status = document.getElementById('status');
    const empty = document.getElementById('empty');
    const welcome = document.getElementById('welcome');
    const headerAvatar = document.getElementById('headerAvatar');
    const searchInput = document.getElementById('searchInput');
    const searchBtn = document.getElementById('searchBtn');

    const editorialEl = document.getElementById('editorial');
    const examPreview = document.getElementById('examPreview');
    const examPreviewGrid = document.getElementById('examPreviewGrid');

    searchInput.addEventListener('keydown', e => { if (e.key === 'Enter') doSearch(); });

    // Load editorial
    (async function loadEditorial() {
      try {
        const res = await fetch('/api/editorial');
        const data = await res.json();
        if (!data.ok) throw new Error(data.error);
        const e = data.editorial;
        const time = new Date(e.generatedAt);
        const timeStr = time.toLocaleString('zh-TW', { year: 'numeric', month: '2-digit', day: '2-digit', hour: '2-digit', minute: '2-digit' });

        let reflectionHtml = '';
        if (e.reflection) {
          reflectionHtml = `<div class="editorial-reflection">
            <div class="editorial-reflection-label">反思</div>
            <div class="editorial-reflection-text">${esc(e.reflection)}</div>
          </div>`;
        }

        let sourcesHtml = '';
        if (e.headlines && e.headlines.length) {
          sourcesHtml = `<div class="editorial-sources">
            <div class="editorial-sources-title">相關新聞</div>
            ${e.headlines.map(h => `<a href="${esc(h.link)}" target="_blank" rel="noopener">${esc(h.source ? h.source + '：' : '')}${esc(h.title)}</a>`).join('')}
          </div>`;
        }

        editorialEl.innerHTML = `
          <div class="editorial-card">
            <div class="editorial-label"><span class="dot"></span>主編評論</div>
            <div class="editorial-title">${esc(e.title)}</div>
            <div class="editorial-body">${esc(e.body)}</div>
            <div class="editorial-meta">
              <div class="editorial-author">
                <img src="/avatar.jpg" alt="Ian">
                <div>
                  <div class="editorial-author-name">Ian</div>
                  <div class="editorial-author-role">主編</div>
                </div>
              </div>
              <div class="editorial-time">${timeStr}</div>
            </div>
            ${reflectionHtml}
            ${sourcesHtml}
          </div>
          <div class="editorial-history-toggle" onclick="openHistoryDialog()">▼ 查看過往評論</div>`;
      } catch (err) {
        editorialEl.innerHTML = `<div class="editorial-loading" style="color:#555;">評論載入失敗：${err.message}</div>`;
      }
    })();

    let historyData = null;
    async function openHistoryDialog() {
      const dialog = document.getElementById('ehDialog');
      dialog.showModal();
      if (historyData) { renderHistoryList(); return; }
      const body = dialog.querySelector('.eh-dialog-body');
      body.innerHTML = '<div style="text-align:center;padding:40px;color:#555;font-size:13px;">載入中...</div>';
      try {
        const res = await fetch('/api/editorial/history?limit=30');
        const data = await res.json();
        if (!data.ok || !data.history.length) {
          body.innerHTML = '<div style="text-align:center;padding:40px;color:#555;font-size:13px;">尚無歷史評論</div>';
          return;
        }
        historyData = data.history;
        renderHistoryList();
      } catch {
        body.innerHTML = '<div style="text-align:center;padding:40px;color:#555;font-size:13px;">載入失敗</div>';
      }
    }

    function renderHistoryList() {
      const body = document.querySelector('#ehDialog .eh-dialog-body');
      const title = document.querySelector('#ehDialog .eh-dialog-title');
      title.textContent = '過往評論';
      let html = '<div class="eh-list">';
      historyData.forEach((e, i) => {
        const t = new Date(e.generatedAt).toLocaleString('zh-TW', { month:'2-digit', day:'2-digit' });
        html += `<div class="eh-list-item" onclick="renderHistoryDetail(${i})">
          <span class="eh-date">${t}</span>
          <span class="eh-title">${esc(e.title)}</span>
          <span class="eh-arrow">›</span>
        </div>`;
        if (i < historyData.length - 1) html += '<div class="eh-list-sep"></div>';
      });
      html += '</div>';
      body.innerHTML = html;
      body.scrollTop = 0;
    }

    function renderHistoryDetail(idx) {
      const e = historyData[idx];
      const body = document.querySelector('#ehDialog .eh-dialog-body');
      const title = document.querySelector('#ehDialog .eh-dialog-title');
      title.textContent = '評論詳情';
      const t = new Date(e.generatedAt).toLocaleString('zh-TW', { year:'numeric', month:'2-digit', day:'2-digit', hour:'2-digit', minute:'2-digit' });
      let reflectionHtml = '';
      if (e.reflection) {
        reflectionHtml = `<div class="eh-detail-reflection">
          <div class="eh-detail-reflection-label">反思</div>
          <div class="eh-detail-reflection-text">${esc(e.reflection)}</div>
        </div>`;
      }
      let sourcesHtml = '';
      if (e.headlines && e.headlines.length) {
        sourcesHtml = `<div class="eh-detail-sources">
          <div class="eh-detail-sources-title">相關新聞</div>
          ${e.headlines.map(h => `<a href="${esc(h.link)}" target="_blank" rel="noopener">${esc(h.title)}</a>`).join('')}
        </div>`;
      }
      body.innerHTML = `<div class="eh-detail">
        <button class="eh-back" onclick="renderHistoryList()">← 返回列表</button>
        <div class="eh-detail-title">${esc(e.title)}</div>
        <div class="eh-detail-date">${t}</div>
        <div class="eh-detail-body">${esc(e.body)}</div>
        ${reflectionHtml}
        ${sourcesHtml}
      </div>`;
      body.scrollTop = 0;
    }

    // Load exam preview
    (async function loadExamPreview() {
      try {
        const res = await fetch('/api/exams');
        const data = await res.json();
        if (!data.ok) return;
        const now = new Date();
        now.setHours(0, 0, 0, 0);
        const cats = data.categories;

        // Filter: only upcoming exams (not ended), sorted by exam date, take top 6
        const upcoming = data.exams
          .filter(e => {
            const examEnd = new Date(e.dates.exam.end);
            examEnd.setHours(23, 59, 59);
            return now <= examEnd;
          })
          .sort((a, b) => new Date(a.dates.exam.start) - new Date(b.dates.exam.start))
          .slice(0, 6);

        if (!upcoming.length) { examPreview.classList.add('hidden'); return; }

        examPreviewGrid.innerHTML = upcoming.map(exam => {
          const cat = cats[exam.category] || { color: '#4f9cf7' };
          const examStart = new Date(exam.dates.exam.start);
          const days = Math.ceil((examStart - now) / 86400000);
          const urgency = days <= 14 ? 'urgent' : days <= 30 ? 'soon' : 'normal';

          // Badge
          let badge = '';
          if (exam.dates.registration) {
            const regEnd = new Date(exam.dates.registration.end);
            regEnd.setHours(23, 59, 59);
            const regStart = new Date(exam.dates.registration.start);
            if (now >= regStart && now <= regEnd) {
              const regDays = Math.ceil((regEnd - now) / 86400000);
              badge = `<span class="exam-mini-badge mini-badge-open">報名中（剩 ${regDays} 天）</span>`;
            }
          }
          if (days <= 14 && days > 0) {
            badge = `<span class="exam-mini-badge mini-badge-exam">即將考試</span>`;
          }

          const weekdays = ['日','一','二','三','四','五','六'];
          const d = examStart;
          const dateStr = `${d.getFullYear()-1911}/${d.getMonth()+1}/${d.getDate()}（${weekdays[d.getDay()]}）`;

          return `<div class="exam-mini" style="--cat-color:${cat.color}" onclick="location.href='/calendar.html'">
            <div class="exam-mini-name">${exam.name}</div>
            <div class="exam-mini-date">考試：${dateStr}</div>
            <div class="exam-mini-countdown">
              <span class="days ${urgency}">${days}</span>
              <span class="unit">天後考試</span>
            </div>
            ${badge}
          </div>`;
        }).join('');
      } catch (e) {
        examPreview.classList.add('hidden');
      }
    })();

    async function doSearch() {
      const q = searchInput.value.trim();
      if (!q) return;
      searchBtn.disabled = true;
      status.className = 'status loading';
      status.textContent = '搜尋中...';
      grid.innerHTML = '';
      empty.style.display = 'none';

      // Hide welcome + editorial + exam preview, show mini avatar
      welcome.classList.add('hidden');
      editorialEl.classList.add('hidden');
      examPreview.classList.add('hidden');
      headerAvatar.classList.add('visible');

      try {
        const res = await fetch(`/api/search?q=${encodeURIComponent(q)}`);
        const data = await res.json();
        if (!data.ok || data.articles.length === 0) {
          empty.style.display = 'block';
          empty.textContent = data.error || '找不到相關新聞';
          status.textContent = '';
          return;
        }
        status.className = 'status';
        status.textContent = `找到 ${data.articles.length} 篇新聞`;
        renderArticles(data.articles);
      } catch (err) {
        status.className = 'status';
        status.textContent = '搜尋失敗: ' + err.message;
      } finally {
        searchBtn.disabled = false;
      }
    }

    function quickSearch(q, el) {
      document.querySelectorAll('.tag').forEach(t => t.classList.remove('active'));
      if (el) el.classList.add('active');
      searchInput.value = q;
      doSearch();
    }

    function renderArticles(articles) {
      grid.innerHTML = '';
      articles.forEach((a, i) => {
        const card = document.createElement('div');
        card.className = 'card';
        const timeAgo = formatDate(a.pubDate);
        card.innerHTML = `
          <div class="card-meta">
            ${a.source ? `<span class="card-source">${esc(a.source)}</span>` : ''}
            <span>${timeAgo}</span>
          </div>
          <div class="card-title"><a href="${esc(a.link)}" target="_blank" rel="noopener">${esc(a.title)}</a></div>
          ${a.snippet ? `<div class="card-snippet">${esc(a.snippet)}</div>` : ''}
        `;
        grid.appendChild(card);
      });
    }

    function formatDate(dateStr) {
      if (!dateStr) return '';
      const d = new Date(dateStr);
      const now = new Date();
      const diffH = Math.round((now - d) / 3600000);
      if (diffH < 1) return '剛剛';
      if (diffH < 24) return `${diffH} 小時前`;
      const diffD = Math.round(diffH / 24);
      if (diffD < 7) return `${diffD} 天前`;
      return d.toLocaleDateString('zh-TW');
    }

    function esc(s) {
      const d = document.createElement('div');
      d.textContent = s || '';
      return d.innerHTML;
    }
  </script>
  <script>fetch('/api/version').then(r=>r.json()).then(d=>{document.getElementById('appVersion').textContent='v'+d.version}).catch(()=>{})</script>
  <script defer src="/_vercel/insights/script.js"></script>
</body>
</html>
