<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ian's EdTech News</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #0a0a0a;
      color: #e0e0e0;
      min-height: 100vh;
    }

    /* Header */
    .header {
      background: #111;
      border-bottom: 1px solid #222;
      padding: 16px 24px;
      display: flex;
      align-items: center;
      gap: 16px;
      position: sticky;
      top: 0;
      z-index: 10;
    }
    .header h1 {
      font-size: 20px;
      font-weight: 700;
      color: #fff;
      white-space: nowrap;
    }
    .header h1 span { color: #4f9cf7; }
    .search-box {
      flex: 1;
      max-width: 500px;
      display: flex;
      gap: 8px;
    }
    .search-box input {
      flex: 1;
      padding: 8px 14px;
      border: 1px solid #333;
      border-radius: 6px;
      background: #1a1a1a;
      color: #e0e0e0;
      font-size: 14px;
      outline: none;
    }
    .search-box input:focus { border-color: #4f9cf7; }
    .search-box button {
      padding: 8px 18px;
      background: #4f9cf7;
      color: #fff;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 14px;
      font-weight: 600;
    }
    .search-box button:hover { background: #3a8ae5; }
    .search-box button:disabled { background: #555; cursor: wait; }

    /* Mini avatar in header (hidden initially) */
    .header-avatar {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      border: 2px solid #4f9cf7;
      object-fit: cover;
      display: none;
      margin-left: auto;
      flex-shrink: 0;
    }
    .header-avatar.visible { display: block; }

    /* Quick tags */
    .tags {
      padding: 10px 24px;
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      align-items: center;
      background: #0e0e0e;
      border-bottom: 1px solid #1a1a1a;
    }
    .tag-group-label {
      font-size: 11px;
      color: #555;
      margin-right: 2px;
      white-space: nowrap;
    }
    .tag-group-label:not(:first-child) {
      margin-left: 10px;
      padding-left: 10px;
      border-left: 1px solid #2a2a2a;
    }
    .tag {
      padding: 4px 12px;
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      border-radius: 14px;
      font-size: 12px;
      color: #aaa;
      cursor: pointer;
      transition: all .2s;
    }
    .tag:hover { background: #252525; color: #fff; border-color: #4f9cf7; }
    .tag.award { border-color: #3a3020; color: #c9a84c; }
    .tag.award:hover { background: #2a2518; border-color: #c9a84c; color: #f0d060; }

    /* Welcome / Landing */
    .welcome {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 60px 24px 40px;
      text-align: center;
      animation: fadeIn .6s ease;
    }
    .welcome.hidden { display: none; }
    .welcome-avatar {
      width: 180px;
      height: 180px;
      border-radius: 50%;
      border: 3px solid #4f9cf7;
      object-fit: cover;
      margin-bottom: 24px;
      box-shadow: 0 0 30px rgba(79, 156, 247, 0.2);
    }
    .welcome h2 {
      font-size: 22px;
      color: #fff;
      margin-bottom: 10px;
    }
    .welcome h2 span { color: #4f9cf7; }
    .welcome p {
      font-size: 14px;
      color: #888;
      margin-bottom: 8px;
      line-height: 1.6;
    }
    .welcome .hint {
      margin-top: 16px;
      display: flex;
      align-items: center;
      gap: 6px;
      color: #4f9cf7;
      font-size: 13px;
      animation: pulse 2s infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* Status bar */
    .status {
      padding: 10px 24px;
      font-size: 13px;
      color: #666;
    }
    .status.loading { color: #4f9cf7; }

    /* Article grid */
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
      gap: 16px;
      padding: 16px 24px;
    }

    /* Card */
    .card {
      background: #141414;
      border: 1px solid #222;
      border-radius: 10px;
      padding: 18px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      transition: border-color .2s;
    }
    .card:hover { border-color: #333; }
    .card-meta {
      display: flex;
      justify-content: space-between;
      font-size: 12px;
      color: #666;
    }
    .card-source {
      background: #1e2a3a;
      color: #4f9cf7;
      padding: 3px 10px;
      border-radius: 4px;
      font-size: 12px;
      font-weight: 600;
    }
    .card-title {
      font-size: 15px;
      font-weight: 600;
      color: #eee;
      line-height: 1.4;
    }
    .card-title a {
      color: inherit;
      text-decoration: none;
    }
    .card-title a:hover { color: #4f9cf7; }
    .card-snippet {
      font-size: 13px;
      color: #888;
      line-height: 1.5;
    }

    /* Empty state */
    .empty {
      text-align: center;
      padding: 60px 24px;
      color: #555;
      font-size: 15px;
    }

    /* Footer */
    .footer {
      text-align: center;
      padding: 24px;
      margin-top: 40px;
      border-top: 1px solid #222;
      color: #555;
      font-size: 13px;
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>ian's <span>EdTech News</span></h1>
    <div class="search-box">
      <input type="text" id="searchInput" placeholder="搜尋教育科技新聞..." value="數位學習 教育科技">
      <button id="searchBtn" onclick="doSearch()">搜尋</button>
    </div>
    <img src="/avatar.jpg" alt="Ian" class="header-avatar" id="headerAvatar">
  </div>
  <div class="tags">
    <span class="tag-group-label">趨勢</span>
    <span class="tag" onclick="quickSearch('數位學習')">數位學習</span>
    <span class="tag" onclick="quickSearch('教育科技 EdTech')">EdTech</span>
    <span class="tag" onclick="quickSearch('AI 教育')">AI 教育</span>
    <span class="tag" onclick="quickSearch('線上課程 平台')">線上課程</span>
    <span class="tag" onclick="quickSearch('教育部 數位')">教育政策</span>
    <span class="tag" onclick="quickSearch('自主學習')">自主學習</span>
    <span class="tag" onclick="quickSearch('教育 AI 生成式')">生成式 AI</span>
    <span class="tag" onclick="quickSearch('遠距教學')">遠距教學</span>
    <span class="tag-group-label">獎項</span>
    <span class="tag award" onclick="quickSearch('教育 科技 獎項 得獎 創新')">EdTech 得獎</span>
  </div>

  <!-- Welcome screen (shown before any search) -->
  <div class="welcome" id="welcome">
    <img src="/avatar.jpg" alt="Ian" class="welcome-avatar">
    <h2>Hi, I'm <span>Ian</span></h2>
    <p>歡迎來到我的教育科技新聞平台</p>
    <p>AI 即時爬取 + 智慧摘要，掌握數位學習最新動態</p>
    <div class="hint">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M7 11l5-5 5 5"/><path d="M7 17l5-5 5 5"/></svg>
      點擊上方標籤或輸入關鍵字開始探索
    </div>
  </div>

  <div class="status" id="status"></div>
  <div class="grid" id="grid"></div>
  <div class="empty" id="empty" style="display:none">找不到相關新聞</div>
  <div class="footer">新創小任 2026</div>

  <script>
    const grid = document.getElementById('grid');
    const status = document.getElementById('status');
    const empty = document.getElementById('empty');
    const welcome = document.getElementById('welcome');
    const headerAvatar = document.getElementById('headerAvatar');
    const searchInput = document.getElementById('searchInput');
    const searchBtn = document.getElementById('searchBtn');

    searchInput.addEventListener('keydown', e => { if (e.key === 'Enter') doSearch(); });

    async function doSearch() {
      const q = searchInput.value.trim();
      if (!q) return;
      searchBtn.disabled = true;
      status.className = 'status loading';
      status.textContent = '搜尋中...';
      grid.innerHTML = '';
      empty.style.display = 'none';

      // Hide welcome, show mini avatar
      welcome.classList.add('hidden');
      headerAvatar.classList.add('visible');

      try {
        const res = await fetch(`/api/search?q=${encodeURIComponent(q)}`);
        const data = await res.json();
        if (!data.ok || data.articles.length === 0) {
          empty.style.display = 'block';
          empty.textContent = data.error || '找不到相關新聞';
          status.textContent = '';
          return;
        }
        status.className = 'status';
        status.textContent = `找到 ${data.articles.length} 篇新聞`;
        renderArticles(data.articles);
      } catch (err) {
        status.className = 'status';
        status.textContent = '搜尋失敗: ' + err.message;
      } finally {
        searchBtn.disabled = false;
      }
    }

    function quickSearch(q) {
      searchInput.value = q;
      doSearch();
    }

    function renderArticles(articles) {
      grid.innerHTML = '';
      articles.forEach((a, i) => {
        const card = document.createElement('div');
        card.className = 'card';
        const timeAgo = formatDate(a.pubDate);
        card.innerHTML = `
          <div class="card-meta">
            ${a.source ? `<span class="card-source">${esc(a.source)}</span>` : ''}
            <span>${timeAgo}</span>
          </div>
          <div class="card-title"><a href="${esc(a.link)}" target="_blank" rel="noopener">${esc(a.title)}</a></div>
          ${a.snippet ? `<div class="card-snippet">${esc(a.snippet)}</div>` : ''}
        `;
        grid.appendChild(card);
      });
    }

    function formatDate(dateStr) {
      if (!dateStr) return '';
      const d = new Date(dateStr);
      const now = new Date();
      const diffH = Math.round((now - d) / 3600000);
      if (diffH < 1) return '剛剛';
      if (diffH < 24) return `${diffH} 小時前`;
      const diffD = Math.round(diffH / 24);
      if (diffD < 7) return `${diffD} 天前`;
      return d.toLocaleDateString('zh-TW');
    }

    function esc(s) {
      const d = document.createElement('div');
      d.textContent = s || '';
      return d.innerHTML;
    }
  </script>
</body>
</html>
