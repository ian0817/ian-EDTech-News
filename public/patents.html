<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" href="/favicon.ico" type="image/x-icon">
  <title>專利追蹤 — ian's EdTech News</title>
  <meta name="description" content="教育科技相關專利追蹤，含 USPTO 美國專利及 TIPO 台灣專利。">
  <meta property="og:title" content="專利追蹤 — ian's EdTech News">
  <meta property="og:description" content="教育科技相關專利追蹤。">
  <meta property="og:type" content="website">
  <link rel="canonical" href="https://edtech-news.vercel.app/patents.html">
  <link rel="manifest" href="/manifest.json">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #0a0a0a;
      color: #e0e0e0;
      min-height: 100vh;
    }
    .header {
      background: #111;
      border-bottom: 1px solid #222;
      padding: 16px 24px;
      display: flex; align-items: center; gap: 16px;
      position: sticky; top: 0; z-index: 10;
    }
    .header h1 { font-size: 20px; font-weight: 700; color: #fff; white-space: nowrap; }
    .header h1 span { color: #4f9cf7; }
    .header h1 a { color: inherit; text-decoration: none; }
    .nav {
      display: flex; gap: 6px; margin-left: auto;
      flex-shrink: 0; align-items: center;
    }
    .nav a {
      padding: 6px 14px; border-radius: 6px;
      font-size: 13px; font-weight: 600;
      color: #aaa; text-decoration: none; transition: all .2s;
    }
    .nav a:hover { color: #fff; background: #1a1a1a; }
    .nav a.active { color: #4f9cf7; background: #1a2a3a; }

    .content { max-width: 900px; margin: 0 auto; padding: 24px; }

    /* Search bar */
    .search-bar {
      display: flex; gap: 8px; margin-bottom: 16px;
    }
    .search-input {
      flex: 1; padding: 8px 14px; border-radius: 8px;
      font-size: 13px; background: #1a1a1a;
      border: 1px solid #333; color: #e0e0e0;
      outline: none; transition: border-color .2s;
    }
    .search-input:focus { border-color: #4f9cf7; }
    .search-input::placeholder { color: #555; }

    /* Tags filter bar */
    .filter-bar {
      display: flex; gap: 6px; flex-wrap: wrap;
      margin-bottom: 20px; align-items: center;
    }
    .filter-label {
      font-size: 11px; color: #555; margin-right: 2px; white-space: nowrap;
    }
    .filter-label:not(:first-child) {
      margin-left: 10px; padding-left: 10px;
      border-left: 1px solid #2a2a2a;
    }
    .ftag {
      padding: 4px 12px; border-radius: 14px;
      font-size: 12px; font-weight: 600;
      border: 1px solid #2a2a2a; background: #1a1a1a;
      color: #aaa; cursor: pointer; transition: all .2s;
      user-select: none;
    }
    .ftag:hover { border-color: #4f9cf7; color: #fff; }
    .ftag.active { background: #1a2a3a; border-color: #4f9cf7; color: #4f9cf7; }
    .ftag.uspto-color.active { background: #1a2a2a; border-color: #4fce7f; color: #4fce7f; }
    .ftag.tipo-color.active { background: #2a2a1a; border-color: #f7d74f; color: #f7d74f; }
    .ftag.cat-color.active { background: #1a1a2a; border-color: #9c9cf7; color: #9c9cf7; }

    /* Summary bar */
    .summary {
      display: flex; gap: 16px; margin-bottom: 20px;
      flex-wrap: wrap; align-items: center;
    }
    .summary-stat {
      display: flex; align-items: center; gap: 6px;
      font-size: 13px; color: #888;
    }
    .summary-stat .num {
      font-size: 22px; font-weight: 800;
      font-variant-numeric: tabular-nums;
      color: #4f9cf7;
    }
    .summary-updated { margin-left: auto; font-size: 11px; color: #555; }

    /* Card */
    .patent-card {
      background: #1e1e1e; border: 1px solid #333;
      border-radius: 10px; padding: 18px 20px;
      margin-bottom: 10px;
      display: flex; align-items: flex-start; gap: 16px;
      transition: border-color .2s;
    }
    .patent-card:hover { border-color: #4f9cf7; }
    .patent-date-box {
      flex-shrink: 0; width: 56px; text-align: center;
      padding: 8px 0; border-radius: 8px;
      background: #252525; border: 1px solid #333;
    }
    .patent-date-box .month { font-size: 11px; font-weight: 700; color: #4f9cf7; }
    .patent-date-box .day { font-size: 22px; font-weight: 800; color: #fff; line-height: 1.2; }
    .patent-date-box .year { font-size: 10px; color: #555; }
    .patent-info { flex: 1; min-width: 0; }
    .patent-title {
      font-size: 15px; font-weight: 600; color: #eee;
      line-height: 1.5; margin-bottom: 6px;
    }
    .patent-title a { color: inherit; text-decoration: none; }
    .patent-title a:hover { color: #4f9cf7; }
    .patent-abstract {
      font-size: 12px; color: #777; line-height: 1.5;
      margin-bottom: 8px;
      display: -webkit-box; -webkit-line-clamp: 2;
      -webkit-box-orient: vertical; overflow: hidden;
    }
    .patent-insight {
      font-size: 12px; color: #b8a46c; line-height: 1.5;
      margin-bottom: 6px; padding: 4px 8px;
      background: #1a1a10; border-left: 2px solid #b8a46c;
      border-radius: 0 4px 4px 0;
    }
    .patent-meta {
      display: flex; gap: 6px; align-items: center; flex-wrap: wrap;
    }
    .patent-badge {
      padding: 2px 8px; border-radius: 4px;
      font-size: 11px; font-weight: 600;
    }
    .patent-badge.uspto { background: #1a2a2a; color: #4fce7f; }
    .patent-badge.tipo { background: #2a2a1a; color: #f7d74f; }
    .patent-badge.number { background: #1a1a2a; color: #9c9cf7; }
    .patent-badge.cat {
      background: #1a1a1e; color: #888;
      border: 1px solid #2a2a2a;
    }
    .patent-inventor { font-size: 11px; color: #666; }
    .patent-inventor-line {
      font-size: 12px; color: #888; margin-bottom: 4px;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .detail-btn {
      padding: 3px 10px; border-radius: 4px;
      font-size: 11px; font-weight: 600;
      background: #1a2a3a; color: #4f9cf7;
      border: 1px solid #2a3a4a; cursor: pointer;
      transition: all .2s;
    }
    .detail-btn:hover { background: #2a3a5a; border-color: #4f9cf7; }

    /* Detail dialog */
    .detail-overlay {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,0.7); z-index: 100;
      justify-content: center; align-items: center;
    }
    .detail-overlay.open { display: flex; }
    .detail-dialog {
      background: #1e1e1e; border: 1px solid #333;
      border-radius: 12px; padding: 28px;
      max-width: 760px; width: 92%; max-height: 85vh;
      overflow-y: auto; position: relative;
    }
    .detail-dialog-title {
      font-size: 16px; font-weight: 700; color: #fff;
      margin-bottom: 12px; line-height: 1.4;
    }
    .detail-row {
      display: flex; gap: 8px; margin-bottom: 8px;
      font-size: 13px; align-items: flex-start;
    }
    .detail-label { color: #666; min-width: 70px; flex-shrink: 0; }
    .detail-value { color: #ccc; }
    .detail-section-label {
      font-size: 10px; font-weight: 700; letter-spacing: .1em;
      color: #444; text-transform: uppercase; margin: 22px 0 8px;
      display: flex; align-items: center; gap: 8px;
    }
    .detail-section-label::after {
      content: ''; flex: 1; height: 1px; background: #2a2a2a;
    }
    /* 做什麼 / 為什麼重要 */
    .detail-what {
      background: #151515; border-radius: 8px; border: 1px solid #2a2a2a;
      padding: 14px 16px;
    }
    .detail-what-lead {
      font-size: 14px; color: #fff; font-weight: 600; line-height: 1.5;
      margin-bottom: 8px;
    }
    .detail-what-bullets {
      font-size: 13px; color: #bbb; line-height: 1.9; white-space: pre-line;
    }
    .detail-why {
      margin-top: 10px; padding: 12px 16px;
      background: #12181e; border-radius: 8px;
      border-left: 3px solid #4f9cf7;
    }
    .detail-why-title { font-size: 13px; color: #4f9cf7; font-weight: 700; margin-bottom: 4px; }
    .detail-why-body  { font-size: 13px; color: #bbb; line-height: 1.75; }
    /* 技術領先功能 */
    .detail-features { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 8px; }
    .feature-tag {
      padding: 5px 12px; border-radius: 20px;
      font-size: 12px; font-weight: 600; color: #4fce7f;
      background: #0e1e14; border: 1px solid #1e4030;
    }
    /* 系統架構圖 */
    .detail-arch {
      font-family: 'SF Mono', 'Fira Code', monospace;
      font-size: 12px; color: #aaa; line-height: 1.9;
      white-space: pre-wrap; background: #0e0e0e;
      padding: 14px 16px; border-radius: 8px;
      border: 1px solid #2a2a2a; margin-top: 8px;
    }
    /* 摘要 */
    .detail-abstract {
      font-size: 13px; color: #888; line-height: 1.9;
      white-space: pre-wrap;
      padding: 14px 16px; background: #111; border-radius: 8px;
      border: 1px solid #222; margin-top: 8px;
    }
    /* 市場INSIGHT訊號 */
    .detail-signals { display: grid; gap: 10px; margin-top: 8px; }
    .signal-card {
      padding: 12px 14px; border-radius: 8px; border: 1px solid #2a2a2a;
    }
    .signal-card:nth-child(1) { border-left: 3px solid #e07b54; background: #1c1712; }
    .signal-card:nth-child(2) { border-left: 3px solid #9c7cf7; background: #151228; }
    .signal-card:nth-child(3) { border-left: 3px solid #4fce7f; background: #0e1a12; }
    .signal-card:nth-child(4) { border-left: 3px solid #b8a46c; background: #1a1a10; }
    .signal-header { display: flex; align-items: baseline; gap: 8px; margin-bottom: 6px; }
    .signal-tag {
      font-size: 9px; font-weight: 800; letter-spacing: .1em;
      padding: 2px 6px; border-radius: 3px;
    }
    .signal-card:nth-child(1) .signal-tag { color: #e07b54; background: #2a1a10; }
    .signal-card:nth-child(2) .signal-tag { color: #9c7cf7; background: #1e1a30; }
    .signal-card:nth-child(3) .signal-tag { color: #4fce7f; background: #0e2018; }
    .signal-card:nth-child(4) .signal-tag { color: #b8a46c; background: #1e1a10; }
    .signal-title { font-size: 13px; font-weight: 700; color: #ddd; }
    .signal-body  { font-size: 13px; color: #aaa; line-height: 1.75; }
    .detail-classifications {
      display: flex; gap: 4px; flex-wrap: wrap; margin-bottom: 12px;
    }
    .detail-cpc {
      padding: 2px 8px; border-radius: 4px;
      font-size: 11px; background: #1a1a2a; color: #9c9cf7;
    }
    .detail-footer {
      display: flex; justify-content: space-between; align-items: center;
      margin-top: 16px; padding-top: 12px; border-top: 1px solid #2a2a2a;
    }
    .detail-link {
      padding: 6px 16px; border-radius: 6px;
      font-size: 13px; font-weight: 600;
      background: #1a2a3a; color: #4f9cf7; border: 1px solid #2a3a4a;
      text-decoration: none; transition: all .2s;
    }
    .detail-link:hover { background: #2a3a5a; }
    .detail-close {
      padding: 6px 16px; border-radius: 6px;
      font-size: 13px; font-weight: 600;
      background: #333; color: #ccc; border: none;
      cursor: pointer; transition: all .2s;
    }
    .detail-close:hover { background: #444; color: #fff; }

    @media (max-width: 600px) {
      .header { flex-wrap: wrap; }
      .nav { width: 100%; justify-content: center; }
    }
    .loading { text-align: center; padding: 60px; color: #555; font-size: 14px; }
    @keyframes shimmer {
      0% { background-position: -400px 0; }
      100% { background-position: 400px 0; }
    }
    .skeleton {
      background: linear-gradient(90deg, #1e1e1e 25%, #2a2a2a 50%, #1e1e1e 75%);
      background-size: 800px 100%;
      animation: shimmer 1.5s infinite;
      border-radius: 6px;
    }
    .skeleton-card {
      background: #1e1e1e; border: 1px solid #333;
      border-radius: 10px; padding: 18px; height: 90px; margin-bottom: 10px;
    }
    .empty-msg { text-align: center; padding: 40px; color: #555; font-size: 14px; }
    .footer {
      text-align: center; padding: 24px; margin-top: 40px;
      border-top: 1px solid #222; color: #555; font-size: 13px;
    }
  </style>
</head>
<body>
  <div class="header">
    <h1><a href="/">ian's <span>EdTech</span></a></h1>
    <nav class="nav">
      <a href="/">新聞</a>
      <a href="/calendar.html">考試行事曆</a>
      <a href="/conferences.html">學術活動</a>
      <a href="/learn.html">新靈感</a>
      <a href="/patents.html" class="active">專利追蹤</a>
      <a href="/market.html">產值分析</a>
    </nav>
  </div>

  <div class="content">
    <div class="search-bar">
      <input class="search-input" id="searchInput" type="text" placeholder="搜尋專利標題或摘要..." oninput="onSearch()">
    </div>
    <div class="filter-bar" id="filterBar"></div>
    <div id="summaryBar"></div>
    <div id="content">
      <div class="skeleton skeleton-card"></div>
      <div class="skeleton skeleton-card"></div>
      <div class="skeleton skeleton-card"></div>
    </div>
  </div>

  <!-- Detail Dialog -->
  <div class="detail-overlay" id="detailOverlay" onclick="if(event.target===this)closeDetail()">
    <div class="detail-dialog" id="detailDialog"></div>
  </div>

  <div class="footer">新創小任 2026 · <a href="https://vercel.com/ian0817s-projects/ian-edtech-news/analytics" target="_blank" rel="noopener" style="color:#4f9cf7;text-decoration:none;">Analytics</a> · <span id="appVersion"></span></div>

  <script>
    const contentEl = document.getElementById('content');
    const filterBar = document.getElementById('filterBar');
    const summaryBarEl = document.getElementById('summaryBar');
    let allPatents = [];
    let activeFilters = { month: 'all', category: 'all', type: 'all' };
    let searchQuery = '';
    let patentsData = {};

    async function init() {
      const res = await fetch('/api/patents').then(r => r.json()).catch(() => ({ ok: false }));

      if (res.ok) {
        allPatents = res.patents || [];
        patentsData = res;
      }

      buildFilters();
      render();
    }

    function formatMonth(ym) {
      // YYYY-MM → 2026年3月
      const [y, m] = ym.split('-');
      return y + '年' + parseInt(m) + '月';
    }

    function buildFilters() {
      let html = '';

      // Month filters (from API months array)
      const months = patentsData.months || [];
      html += '<span class="filter-label">月份</span>';
      html += '<span class="ftag active" onclick="setFilter(\'month\',\'all\',this)">全部</span>';
      for (const m of months.slice(0, 12)) {
        html += '<span class="ftag tipo-color" onclick="setFilter(\'month\',\'' + m + '\',this)">' + formatMonth(m) + '</span>';
      }

      // Category filters
      html += '<span class="filter-label">分類</span>';
      html += '<span class="ftag active" onclick="setFilter(\'category\',\'all\',this)">全部</span>';
      html += '<span class="ftag cat-color" onclick="setFilter(\'category\',\'學習\',this)">學習</span>';
      html += '<span class="ftag cat-color" onclick="setFilter(\'category\',\'教學\',this)">教學</span>';
      html += '<span class="ftag cat-color" onclick="setFilter(\'category\',\'考試評測\',this)">考試評測</span>';
      html += '<span class="ftag cat-color" onclick="setFilter(\'category\',\'校務\',this)">校務</span>';

      // Patent type filters
      html += '<span class="filter-label">類型</span>';
      html += '<span class="ftag active" onclick="setFilter(\'type\',\'all\',this)">全部</span>';
      html += '<span class="ftag uspto-color" onclick="setFilter(\'type\',\'發明\',this)">發明</span>';
      html += '<span class="ftag uspto-color" onclick="setFilter(\'type\',\'新型\',this)">新型</span>';

      filterBar.innerHTML = html;
    }

    function setFilter(dimension, value, el) {
      activeFilters[dimension] = value;
      const labelMap = { month: '月份', category: '分類', type: '類型' };
      const label = labelMap[dimension];
      let inGroup = false;
      filterBar.querySelectorAll('.filter-label, .ftag').forEach(node => {
        if (node.classList.contains('filter-label')) {
          inGroup = node.textContent === label;
          return;
        }
        if (inGroup) node.classList.remove('active');
      });
      if (el) el.classList.add('active');
      render();
    }

    function onSearch() {
      searchQuery = document.getElementById('searchInput').value.trim().toLowerCase();
      render();
    }

    function render() {
      const filtered = allPatents.filter(p => {
        if (activeFilters.month !== 'all') {
          if (!p.publicationDate || !p.publicationDate.startsWith(activeFilters.month)) return false;
        }
        if (activeFilters.category !== 'all') {
          if (!p.categories || !p.categories.includes(activeFilters.category)) return false;
        }
        if (activeFilters.type !== 'all') {
          if (p.patentType !== activeFilters.type) return false;
        }
        if (searchQuery) {
          const text = `${p.title} ${p.patentNumber} ${(p.inventors||[]).join(' ')} ${p.abstract||''}`.toLowerCase();
          if (!text.includes(searchQuery)) return false;
        }
        return true;
      });

      // Summary bar
      const updatedAt = patentsData.updatedAt
        ? new Date(patentsData.updatedAt).toLocaleString('zh-TW')
        : '尚未更新';
      const monthLabel = activeFilters.month !== 'all' ? ' (' + formatMonth(activeFilters.month) + ')' : '';

      summaryBarEl.innerHTML = `
        <div class="summary">
          <div class="summary-stat"><span class="num">${filtered.length}</span> 筆專利${monthLabel}</div>
          <div class="summary-stat" style="font-size:12px;color:#555">共 ${allPatents.length} 筆 · 台灣智慧財產局</div>
          <span class="summary-updated">更新於 ${esc(updatedAt)}</span>
        </div>`;

      if (!filtered.length) {
        contentEl.innerHTML = '<div class="empty-msg">目前沒有符合條件的專利資料</div>';
        return;
      }

      contentEl.innerHTML = filtered.map(p => renderCard(p)).join('');
    }

    function renderCard(p) {
      const dateBox = p.publicationDate ? makeDateBox(p.publicationDate) : '';
      const typeBadge = p.patentType === '新型'
        ? '<span class="patent-badge tipo">新型</span>'
        : p.patentType === '設計'
        ? '<span class="patent-badge tipo">設計</span>'
        : '<span class="patent-badge uspto">發明</span>';
      const numberBadge = '<span class="patent-badge number">' + esc(p.patentNumber) + '</span>';
      const catBadges = (p.categories || []).map(c =>
        '<span class="patent-badge cat">' + esc(c) + '</span>'
      ).join('');
      const statusHtml = p.status ? '<span class="patent-inventor">' + esc(p.status) + '</span>' : '';

      // 發明人
      const inventors = (p.inventors || []);
      const inventorHtml = inventors.length
        ? '<div class="patent-inventor-line">發明人：' + esc(inventors.join('、')) + '</div>'
        : '';

      // Insight (白話應用情境)
      const insightHtml = p.insight
        ? '<div class="patent-insight">' + esc(p.insight) + '</div>'
        : '';

      return `
        <div class="patent-card">
          ${dateBox}
          <div class="patent-info">
            <div class="patent-title"><a href="${esc(p.url)}" target="_blank" rel="noopener">${esc(p.title)}</a></div>
            ${inventorHtml}
            ${insightHtml}
            <div class="patent-meta">
              ${typeBadge}
              ${numberBadge}
              ${catBadges}
              ${statusHtml}
              <button class="detail-btn" onclick="event.stopPropagation();openDetail('${esc(p.id)}')">詳細資料</button>
            </div>
          </div>
        </div>`;
    }

    function makeDateBox(dateStr) {
      const d = new Date(dateStr);
      const months = ['1月','2月','3月','4月','5月','6月','7月','8月','9月','10月','11月','12月'];
      return '<div class="patent-date-box">' +
        '<div class="month">' + months[d.getMonth()] + '</div>' +
        '<div class="day">' + d.getDate() + '</div>' +
        '<div class="year">' + d.getFullYear() + '</div>' +
        '</div>';
    }

    function renderFullReport(r) {
      if (!r) return '';
      let html = '';

      // 做什麼
      if (r.what) {
        const lines = r.what.split('\n');
        const lead = lines[0].replace(/^•\s*/, '');
        const bullets = lines.slice(1).join('\n');
        html += `<div class="detail-section-label">做什麼</div>
          <div class="detail-what">
            <div class="detail-what-lead">${esc(lead)}</div>
            ${bullets ? '<div class="detail-what-bullets">' + esc(bullets) + '</div>' : ''}
          </div>`;
      }

      // 為什麼重要
      if (r.why) {
        const colonIdx = r.why.indexOf('。\n');
        let whyTitle = '', whyBody = r.why;
        if (colonIdx > -1) { whyTitle = r.why.substring(0, colonIdx + 1); whyBody = r.why.substring(colonIdx + 2); }
        else if (r.why.includes('標題：')) {
          whyTitle = r.why.replace(/標題：(.+?)[\n。][\s\S]*/, '$1');
          whyBody = r.why.replace(/標題：.+?\n說明：\s*/, '');
        }
        html += `<div class="detail-why">
          <div class="detail-why-title">${esc(whyTitle || r.why.substring(0, 30))}</div>
          <div class="detail-why-body">${esc(whyBody)}</div>
        </div>`;
      }

      // 技術領先功能
      if (r.features && r.features.length) {
        html += `<div class="detail-section-label">技術領先功能</div>
          <div class="detail-features">
            ${r.features.map(f => `<span class="feature-tag">${esc(f)}</span>`).join('')}
          </div>`;
      }

      // 系統架構圖
      if (r.arch) {
        html += `<div class="detail-section-label">系統架構圖（依專利說明書）</div>
          <div class="detail-arch">${esc(r.arch)}</div>`;
      }

      // 市場INSIGHT訊號
      if (r.signals && r.signals.length) {
        html += `<div class="detail-section-label">市場 Insight 訊號</div>
          <div class="detail-signals">
            ${r.signals.map(s => `
              <div class="signal-card">
                <div class="signal-header">
                  <span class="signal-tag">${esc(s.tag || '')}</span>
                  <span class="signal-title">${esc(s.title || '')}</span>
                </div>
                <div class="signal-body">${esc(s.body || '')}</div>
              </div>`).join('')}
          </div>`;
      }

      return html;
    }

    function openDetail(patentId) {
      const p = allPatents.find(x => x.id === patentId);
      if (!p) return;

      const inventors = (p.inventors || []).join('、') || '未列出';
      const hasReport = p.report && p.report.signals;
      document.getElementById('detailDialog').innerHTML = `
        <div class="detail-dialog-title">${esc(p.title)}</div>
        <div class="detail-row"><span class="detail-label">專利號碼</span><span class="detail-value">${esc(p.patentNumber)}</span></div>
        <div class="detail-row"><span class="detail-label">類型</span><span class="detail-value">${esc(p.patentType || '發明')}</span></div>
        <div class="detail-row"><span class="detail-label">公告日</span><span class="detail-value">${esc(p.publicationDate || '未知')}</span></div>
        <div class="detail-row"><span class="detail-label">申請日</span><span class="detail-value">${esc(p.filingDate || '未知')}</span></div>
        <div class="detail-row"><span class="detail-label">發明人</span><span class="detail-value">${esc(inventors)}</span></div>
        <div class="detail-row"><span class="detail-label">狀態</span><span class="detail-value">${esc(p.status || '未知')}</span></div>
        ${hasReport ? renderFullReport(p.report) : (p.abstract ? '<div class="detail-section-label">專利摘要</div><div class="detail-abstract">' + esc(p.abstract) + '</div>' : '')}
        <div class="detail-footer">
          <a class="detail-link" href="${esc(p.url)}" target="_blank" rel="noopener">前往專利局 ↗</a>
          <button class="detail-close" onclick="closeDetail()">關閉</button>
        </div>`;

      document.getElementById('detailOverlay').classList.add('open');
    }

    function closeDetail() {
      document.getElementById('detailOverlay').classList.remove('open');
    }

    function esc(s) {
      const d = document.createElement('div');
      d.textContent = s || '';
      return d.innerHTML;
    }

    document.addEventListener('keydown', e => { if (e.key === 'Escape') closeDetail(); });

    init();
  </script>
  <script>fetch('/api/version').then(r=>r.json()).then(d=>{document.getElementById('appVersion').textContent='v'+d.version}).catch(()=>{})</script>
  <script defer src="/_vercel/insights/script.js"></script>
</body>
</html>
