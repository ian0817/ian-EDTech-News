<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" href="/favicon.ico" type="image/x-icon">
  <title>新靈感 — ian's EdTech</title>
  <meta name="description" content="EdTech 趨勢儀表板、每日知識卡、AI 教學助手，追蹤教育科技關鍵字熱度。">
  <meta property="og:title" content="新靈感 — ian's EdTech">
  <meta property="og:description" content="EdTech 趨勢儀表板、每日知識卡、AI 教學助手。">
  <meta property="og:type" content="website">
  <link rel="canonical" href="https://edtech-news.vercel.app/learn.html">
  <link rel="manifest" href="/manifest.json">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #0a0a0a;
      color: #e0e0e0;
      min-height: 100vh;
    }
    .header {
      background: #111;
      border-bottom: 1px solid #222;
      padding: 16px 24px;
      display: flex; align-items: center; gap: 16px;
      position: sticky; top: 0; z-index: 10;
    }
    .header h1 { font-size: 20px; font-weight: 700; color: #fff; white-space: nowrap; }
    .header h1 span { color: #4f9cf7; }
    .header h1 a { color: inherit; text-decoration: none; }
    .nav {
      display: flex; gap: 6px; margin-left: auto;
      flex-shrink: 0; align-items: center;
    }
    .nav a {
      padding: 6px 14px; border-radius: 6px;
      font-size: 13px; font-weight: 600;
      color: #aaa; text-decoration: none; transition: all .2s;
    }
    .nav a:hover { color: #fff; background: #1a1a1a; }
    .nav a.active { color: #4f9cf7; background: #1a2a3a; }
    .nav-soon {
      padding: 6px 14px; font-size: 13px; font-weight: 600;
      color: #555; cursor: default;
    }

    .content { max-width: 900px; margin: 0 auto; padding: 24px; }

    /* Page title */
    .page-title {
      font-size: 22px; font-weight: 800; color: #fff;
      margin-bottom: 6px;
    }
    .page-subtitle {
      font-size: 13px; color: #666; margin-bottom: 28px;
    }

    /* Top Keywords */
    .top-section { margin-bottom: 36px; }
    .section-label {
      font-size: 15px; font-weight: 700; color: #888;
      margin-bottom: 14px;
    }
    .top-list { display: flex; flex-direction: column; gap: 8px; }
    .top-item {
      display: flex; align-items: center; gap: 14px;
      background: #1e1e1e; border: 1px solid #333;
      border-radius: 10px; padding: 14px 18px;
      transition: border-color .2s;
    }
    .top-item:hover { border-color: #4f9cf7; }
    .top-rank {
      font-size: 24px; font-weight: 900; width: 36px; text-align: center;
      font-variant-numeric: tabular-nums;
    }
    .top-rank.r1 { color: #f7d74f; }
    .top-rank.r2 { color: #c0c0c0; }
    .top-rank.r3 { color: #cd7f32; }
    .top-rank.r4, .top-rank.r5 { color: #555; }
    .top-info { flex: 1; }
    .top-label { font-size: 16px; font-weight: 700; color: #eee; }
    .top-count { font-size: 12px; color: #888; margin-top: 2px; }
    .top-trend {
      font-size: 18px; width: 32px; text-align: center;
    }
    .trend-up { color: #4fce7f; }
    .trend-down { color: #f74f4f; }
    .trend-flat { color: #666; }
    .top-bar-wrap {
      flex: 1; max-width: 200px; height: 8px;
      background: #111; border-radius: 4px; overflow: hidden;
    }
    .top-bar {
      height: 100%; border-radius: 4px;
      background: linear-gradient(90deg, #4f9cf7, #9c4ff7);
      transition: width .6s ease;
    }

    /* Keyword detail cards */
    .kw-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 14px;
      margin-bottom: 36px;
    }
    .kw-card {
      background: #1e1e1e; border: 1px solid #333;
      border-radius: 10px; padding: 18px 20px;
      transition: border-color .2s;
    }
    .kw-card:hover { border-color: #4f9cf7; }
    .kw-header {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 14px;
    }
    .kw-label { font-size: 15px; font-weight: 700; color: #eee; }
    .kw-total { font-size: 12px; color: #888; }
    .kw-trend-badge {
      padding: 2px 8px; border-radius: 4px;
      font-size: 11px; font-weight: 700;
    }
    .kw-trend-badge.up { background: #1a2a1a; color: #4fce7f; }
    .kw-trend-badge.down { background: #2a1a1a; color: #f74f4f; }
    .kw-trend-badge.flat { background: #1a1a1a; color: #666; }

    /* Mini bar chart */
    .kw-chart {
      display: flex; align-items: flex-end; gap: 4px;
      height: 60px; margin-bottom: 8px;
    }
    .kw-bar-col {
      flex: 1; display: flex; flex-direction: column;
      align-items: center; justify-content: flex-end; height: 100%;
    }
    .kw-bar {
      width: 100%; border-radius: 3px 3px 0 0;
      background: #4f9cf7; min-height: 2px;
      transition: height .4s ease;
    }
    .kw-bar.zero { background: #222; }
    .kw-day-labels {
      display: flex; gap: 4px;
    }
    .kw-day-label {
      flex: 1; text-align: center;
      font-size: 10px; color: #555;
      font-variant-numeric: tabular-nums;
    }

    /* ===== Micro-learning ===== */
    .micro-section { margin-top: 8px; margin-bottom: 36px; }

    /* Flip card */
    .flip-container {
      perspective: 800px;
      cursor: pointer;
      margin-bottom: 16px;
    }
    .flip-card {
      position: relative;
      width: 100%; min-height: 200px;
      transition: transform .6s;
      transform-style: preserve-3d;
    }
    .flip-card.flipped { transform: rotateY(180deg); }
    .flip-front, .flip-back {
      position: absolute; top: 0; left: 0; width: 100%; min-height: 200px;
      backface-visibility: hidden;
      border-radius: 14px; padding: 28px 30px;
      display: flex; flex-direction: column; justify-content: center;
    }
    .flip-front {
      background: linear-gradient(135deg, #1a2a3a, #1e1e1e);
      border: 1px solid #333;
    }
    .flip-back {
      background: #1e1e1e; border: 1px solid #333;
      transform: rotateY(180deg);
    }
    .flip-topic {
      font-size: 11px; font-weight: 700; color: #4f9cf7;
      margin-bottom: 10px; text-transform: uppercase; letter-spacing: 1px;
    }
    .flip-question {
      font-size: 20px; font-weight: 800; color: #fff;
      line-height: 1.5; margin-bottom: 16px;
    }
    .flip-hint {
      font-size: 12px; color: #555;
    }
    .flip-answer {
      font-size: 15px; color: #ccc; line-height: 1.8;
      margin-bottom: 14px; white-space: pre-line;
    }
    .flip-further {
      font-size: 12px; color: #4f9cf7; line-height: 1.5;
      padding-top: 10px; border-top: 1px solid #2a2a2a;
    }
    .flip-back-hint {
      font-size: 11px; color: #444; margin-top: 12px;
    }

    /* History toggle button */
    .micro-history-toggle {
      font-size: 13px; font-weight: 600; color: #666;
      margin-top: 20px; cursor: pointer; user-select: none;
      transition: color .2s;
    }
    .micro-history-toggle:hover { color: #4f9cf7; }

    /* Micro-history dialog */
    .mh-dialog {
      background: #1e1e1e;
      border: 1px solid #333;
      border-radius: 14px;
      color: #e0e0e0;
      padding: 0;
      width: min(560px, 92vw);
      max-height: 80vh;
      overflow: hidden;
      box-shadow: 0 20px 60px rgba(0,0,0,.6);
      margin: auto;
    }
    .mh-dialog::backdrop { background: rgba(0,0,0,.65); }
    .mh-dialog-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 18px 22px; border-bottom: 1px solid #222;
      position: sticky; top: 0; background: #1e1e1e; z-index: 1;
    }
    .mh-dialog-title { font-size: 16px; font-weight: 700; color: #fff; }
    .mh-dialog-close {
      background: none; border: none; color: #555; font-size: 20px;
      cursor: pointer; padding: 4px 8px; border-radius: 6px;
      transition: all .2s; line-height: 1;
    }
    .mh-dialog-close:hover { color: #fff; background: #222; }
    .mh-dialog-body { overflow-y: auto; max-height: calc(80vh - 60px); }

    /* List view */
    .mh-list { padding: 8px 12px; }
    .mh-list-item {
      display: flex; align-items: center; gap: 12px;
      padding: 14px 16px; border-radius: 8px;
      cursor: pointer; transition: background .15s;
    }
    .mh-list-item:hover { background: #1a1a1a; }
    .mh-list-item .mh-date {
      flex-shrink: 0; font-size: 12px; color: #555;
      font-variant-numeric: tabular-nums; white-space: nowrap;
    }
    .mh-list-item .mh-topic {
      font-size: 14px; font-weight: 600; color: #ddd;
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }
    .mh-list-item .mh-arrow { flex-shrink: 0; color: #444; font-size: 12px; margin-left: auto; }
    .mh-list-sep { height: 1px; background: #1a1a1a; margin: 0 16px; }

    /* Detail view */
    .mh-detail { padding: 22px; }
    .mh-back {
      display: inline-flex; align-items: center; gap: 6px;
      font-size: 13px; color: #4f9cf7; cursor: pointer;
      margin-bottom: 16px; padding: 4px 0;
      background: none; border: none; transition: opacity .2s;
    }
    .mh-back:hover { opacity: .7; }
    .mh-detail-topic { font-size: 12px; color: #4f9cf7; font-weight: 600; margin-bottom: 6px; }
    .mh-detail-question { font-size: 18px; font-weight: 700; color: #fff; margin-bottom: 6px; }
    .mh-detail-date { font-size: 12px; color: #555; margin-bottom: 18px; }
    .mh-detail-answer { font-size: 14px; color: #bbb; line-height: 1.8; white-space: pre-line; }
    .mh-detail-further {
      margin-top: 16px; padding: 14px 18px;
      background: #1a2a3a; border-radius: 10px;
      font-size: 13px; color: #4f9cf7; line-height: 1.6;
    }

    /* Pagination */
    .mh-pagination {
      display: flex; align-items: center; justify-content: space-between;
      padding: 12px 16px; border-top: 1px solid #222;
    }
    .mh-pagination button {
      background: #1a1a1a; border: 1px solid #333; color: #4f9cf7;
      padding: 6px 14px; border-radius: 6px; cursor: pointer;
      font-size: 13px; transition: all .2s;
    }
    .mh-pagination button:hover { background: #222; border-color: #4f9cf7; }
    .mh-page-info { font-size: 12px; color: #555; }

    /* ===== AI Teaching Assistant ===== */
    .ai-section { margin-bottom: 36px; }
    .ai-templates {
      display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 14px;
    }
    .ai-tpl {
      padding: 8px 16px; border-radius: 8px;
      border: 1px solid #333; background: #1e1e1e;
      color: #ccc; font-size: 13px; cursor: pointer;
      transition: all .2s; user-select: none;
    }
    .ai-tpl:hover { border-color: #4f9cf7; color: #fff; }
    .ai-tpl.active { border-color: #4f9cf7; color: #4f9cf7; background: #1a2a3a; }
    .ai-input-wrap {
      display: flex; gap: 10px; margin-bottom: 16px;
    }
    .ai-input {
      flex: 1; padding: 12px 16px; border-radius: 10px;
      border: 1px solid #333; background: #1a1a1a;
      color: #e0e0e0; font-size: 14px; outline: none;
      font-family: inherit; resize: none; min-height: 48px;
    }
    .ai-input:focus { border-color: #4f9cf7; }
    .ai-input::placeholder { color: #555; }
    .ai-submit {
      padding: 12px 24px; border-radius: 10px;
      border: none; background: #4f9cf7; color: #fff;
      font-size: 14px; font-weight: 700; cursor: pointer;
      white-space: nowrap; transition: background .2s;
      flex-shrink: 0; align-self: flex-end;
    }
    .ai-submit:hover { background: #3a8ae5; }
    .ai-submit:disabled { background: #333; color: #666; cursor: wait; }
    .ai-result {
      background: #1e1e1e; border: 1px solid #333;
      border-radius: 12px; padding: 22px 24px;
      display: none; position: relative;
    }
    .ai-result.visible { display: block; }
    .ai-result-text {
      font-size: 14px; color: #ccc; line-height: 1.8;
      white-space: pre-line;
    }
    .ai-result-actions {
      display: flex; gap: 8px; margin-top: 14px;
      padding-top: 12px; border-top: 1px solid #222;
    }
    .ai-copy {
      padding: 6px 14px; border-radius: 6px;
      border: 1px solid #333; background: transparent;
      color: #888; font-size: 12px; cursor: pointer;
      transition: all .2s;
    }
    .ai-copy:hover { border-color: #4f9cf7; color: #4f9cf7; }
    .ai-error {
      color: #f74f4f; font-size: 13px; padding: 16px;
      text-align: center;
    }

    /* Updated info */
    .updated-info {
      text-align: center; padding: 20px;
      font-size: 12px; color: #444;
    }

    .footer {
      text-align: center; padding: 24px; margin-top: 20px;
      border-top: 1px solid #222; color: #555; font-size: 13px;
    }
    .loading { text-align: center; padding: 60px; color: #555; font-size: 14px; }
    @keyframes shimmer {
      0% { background-position: -400px 0; }
      100% { background-position: 400px 0; }
    }
    .skeleton {
      background: linear-gradient(90deg, #1e1e1e 25%, #2a2a2a 50%, #1e1e1e 75%);
      background-size: 800px 100%;
      animation: shimmer 1.5s infinite;
      border-radius: 6px;
    }
    .skeleton-line { height: 14px; margin-bottom: 10px; }
    .skeleton-line.short { width: 40%; }
    .skeleton-card {
      background: #1e1e1e; border: 1px solid #333;
      border-radius: 10px; padding: 18px; height: 160px; margin-bottom: 10px;
    }

    @media (max-width: 600px) {
      .header { flex-wrap: wrap; }
      .nav { width: 100%; justify-content: center; }
      .top-bar-wrap { display: none; }
      .kw-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="header">
    <h1><a href="/">ian's <span>EdTech</span></a></h1>
    <nav class="nav">
      <a href="/">新聞</a>
      <a href="/calendar.html">考試行事曆</a>
      <a href="/conferences.html">學術活動</a>
      <a href="/learn.html" class="active">新靈感</a>
      <a href="/patents.html">專利追蹤</a>
    </nav>
  </div>

  <div class="content">
    <div class="page-title">EdTech 趨勢儀表板</div>
    <div class="page-subtitle">追蹤教育科技關鍵字的新聞熱度，每 6 小時自動更新</div>

    <!-- Micro-learning -->
    <div class="micro-section" id="microSection" style="display:none;"></div>

    <!-- AI Teaching Assistant -->
    <div class="ai-section">
      <div class="section-label">AI 教學助手</div>
      <div class="ai-templates">
        <span class="ai-tpl" onclick="fillTemplate(this, '幫我出 5 題{subject}的選擇題，適合{grade}學生，含答案與解析')">出題</span>
        <span class="ai-tpl" onclick="fillTemplate(this, '把以下內容改寫成{grade}學生能理解的版本：\n\n')">改寫</span>
        <span class="ai-tpl" onclick="fillTemplate(this, '設計一份 40 分鐘的{subject}教案，使用翻轉教室策略，適合{grade}')">教案設計</span>
        <span class="ai-tpl" onclick="fillTemplate(this, '列出 5 個適合教{subject}的免費數位工具，簡述各工具的特色與使用情境')">工具推薦</span>
        <span class="ai-tpl" onclick="fillTemplate(this, '針對{subject}這個單元，設計 3 個促進高層次思考的課堂提問')">提問設計</span>
      </div>
      <div class="ai-input-wrap">
        <textarea class="ai-input" id="aiInput" rows="2" placeholder="輸入你的教學需求，或點選上方模板..."></textarea>
        <button class="ai-submit" id="aiSubmit" onclick="submitAI()">生成</button>
      </div>
      <div class="ai-result" id="aiResult">
        <div class="ai-result-text" id="aiResultText"></div>
        <div class="ai-result-actions">
          <button class="ai-copy" onclick="copyResult()">複製內容</button>
        </div>
      </div>
    </div>

    <!-- Trends -->
    <div id="main">
      <div class="section-label" style="margin-bottom:14px">本週熱門關鍵字 Top 5</div>
      <div class="skeleton skeleton-card"></div>
      <div class="skeleton skeleton-card"></div>
      <div class="skeleton skeleton-card"></div>
    </div>
  </div>

  <div class="updated-info" id="updatedInfo"></div>
  <div class="footer">新創小任 2026 · <a href="https://vercel.com/ian0817s-projects/ian-edtech-news/analytics" target="_blank" rel="noopener" style="color:#4f9cf7;text-decoration:none;">Analytics</a> · <span id="appVersion"></span></div>

  <script>
    const mainEl = document.getElementById('main');

    async function init() {
      try {
        const res = await fetch('/api/trends');
        const data = await res.json();
        if (!data.ok) throw new Error(data.error || 'API error');
        render(data);
      } catch (err) {
        mainEl.innerHTML = `<div class="loading" style="color:#f74f4f;">載入失敗: ${esc(err.message)}</div>`;
      }
    }

    function render(data) {
      const { keywords, days, topKeywords, generatedAt } = data;
      const maxTotal = Math.max(...keywords.map(k => k.total), 1);

      // Updated info
      const time = new Date(generatedAt);
      const timeStr = time.toLocaleString('zh-TW', { month:'2-digit', day:'2-digit', hour:'2-digit', minute:'2-digit' });
      document.getElementById('updatedInfo').textContent = `資料更新時間：${timeStr}`;

      let html = '';

      // Top 5
      html += '<div class="top-section">';
      html += '<div class="section-label">本週熱門關鍵字 Top 5</div>';
      html += '<div class="top-list">';
      topKeywords.forEach(kw => {
        const pct = maxTotal > 0 ? Math.round(kw.total / maxTotal * 100) : 0;
        const trendIcon = kw.trend === 'up' ? '↑' : kw.trend === 'down' ? '↓' : '→';
        const trendClass = 'trend-' + kw.trend;
        html += `
          <div class="top-item">
            <span class="top-rank r${kw.rank}">${kw.rank}</span>
            <div class="top-info">
              <div class="top-label">${esc(kw.label)}</div>
              <div class="top-count">${kw.total} 篇報導</div>
            </div>
            <div class="top-bar-wrap"><div class="top-bar" style="width:${pct}%"></div></div>
            <span class="top-trend ${trendClass}">${trendIcon}</span>
          </div>`;
      });
      html += '</div></div>';

      // Keyword detail cards
      html += '<div class="section-label">各關鍵字 7 日趨勢</div>';
      html += '<div class="kw-grid">';
      keywords.forEach(kw => {
        const maxCount = Math.max(...kw.counts, 1);
        const trendLabel = kw.trend === 'up' ? '上升' : kw.trend === 'down' ? '下降' : '持平';

        html += `<div class="kw-card">
          <div class="kw-header">
            <div>
              <span class="kw-label">${esc(kw.label)}</span>
              <span class="kw-total">${kw.total} 篇</span>
            </div>
            <span class="kw-trend-badge ${kw.trend}">${trendLabel}</span>
          </div>
          <div class="kw-chart">`;

        kw.counts.forEach(c => {
          const h = Math.max(Math.round(c / maxCount * 52), 2);
          html += `<div class="kw-bar-col"><div class="kw-bar${c === 0 ? ' zero' : ''}" style="height:${h}px" title="${c} 篇"></div></div>`;
        });

        html += '</div><div class="kw-day-labels">';
        days.forEach(d => {
          const parts = d.split('-');
          html += `<span class="kw-day-label">${parseInt(parts[1])}/${parseInt(parts[2])}</span>`;
        });
        html += '</div></div>';
      });
      html += '</div>';

      mainEl.innerHTML = html;
    }

    function esc(s) {
      const d = document.createElement('div');
      d.textContent = s || '';
      return d.innerHTML;
    }

    // AI Teaching Assistant
    const aiInput = document.getElementById('aiInput');
    const aiSubmit = document.getElementById('aiSubmit');
    const aiResult = document.getElementById('aiResult');
    const aiResultText = document.getElementById('aiResultText');

    function fillTemplate(el, tpl) {
      document.querySelectorAll('.ai-tpl').forEach(t => t.classList.remove('active'));
      el.classList.add('active');
      aiInput.value = tpl;
      aiInput.focus();
      // Select first placeholder
      const m = tpl.match(/\{[^}]+\}/);
      if (m) {
        const start = tpl.indexOf(m[0]);
        aiInput.setSelectionRange(start, start + m[0].length);
      }
    }

    async function submitAI() {
      const prompt = aiInput.value.trim();
      if (!prompt) return;
      aiSubmit.disabled = true;
      aiSubmit.textContent = '生成中...';
      aiResult.classList.add('visible');
      aiResultText.textContent = '思考中...';

      try {
        const res = await fetch('/api/teach-assist', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ prompt }),
        });
        const data = await res.json();
        if (!data.ok) throw new Error(data.error);
        aiResultText.textContent = data.result;
      } catch (err) {
        aiResultText.innerHTML = '<span class="ai-error">生成失敗：' + esc(err.message) + '</span>';
      } finally {
        aiSubmit.disabled = false;
        aiSubmit.textContent = '生成';
      }
    }

    function copyResult() {
      const text = aiResultText.textContent;
      navigator.clipboard.writeText(text).then(() => {
        const btn = document.querySelector('.ai-copy');
        btn.textContent = '已複製！';
        setTimeout(() => btn.textContent = '複製內容', 1500);
      });
    }


    // Micro-learning
    (async function loadMicroLearn() {
      const section = document.getElementById('microSection');
      try {
        const res = await fetch('/api/microlearn');
        const data = await res.json();
        if (!data.ok) return;
        section.style.display = 'block';
        const card = data.card;
        const history = data.history || [];

        let html = '<div class="section-label">每日啟發</div>';

        // Flip card
        html += `
          <div class="flip-container" onclick="this.querySelector('.flip-card').classList.toggle('flipped')">
            <div class="flip-card">
              <div class="flip-front">
                <div class="flip-topic">${esc(card.topic)}</div>
                <div class="flip-question">${esc(card.question)}</div>
                <div class="flip-hint">點擊翻面查看答案</div>
              </div>
              <div class="flip-back">
                <div class="flip-topic">${esc(card.topic)}</div>
                <div class="flip-answer">${esc(card.answer)}</div>
                ${card.further ? '<div class="flip-further">' + esc(card.further) + '</div>' : ''}
                <div class="flip-back-hint">再次點擊翻回正面</div>
              </div>
            </div>
          </div>`;

        // History toggle button
        if (history.length) {
          html += `<div class="micro-history-toggle" onclick="openMicroHistoryDialog()">📚 過往知識卡 (${history.length})</div>`;
        }

        section.innerHTML = html;
      } catch {}
    })();

    // Micro-history dialog
    let mhData = [];
    let mhPage = 0;
    const MH_PER_PAGE = 20;

    async function openMicroHistoryDialog() {
      try {
        const res = await fetch('/api/microlearn/history?limit=200');
        const data = await res.json();
        if (!data.ok) return;
        mhData = data.history || [];
        mhPage = 0;
        renderMicroHistoryList();
        document.getElementById('mhDialog').showModal();
      } catch {}
    }

    function renderMicroHistoryList() {
      const body = document.querySelector('#mhDialog .mh-dialog-body');
      const title = document.querySelector('#mhDialog .mh-dialog-title');
      const totalPages = Math.ceil(mhData.length / MH_PER_PAGE);
      title.textContent = totalPages > 1 ? `過往知識卡（${mhPage+1}/${totalPages}）` : '過往知識卡';
      const start = mhPage * MH_PER_PAGE;
      const pageData = mhData.slice(start, start + MH_PER_PAGE);

      let html = '<div class="mh-list">';
      pageData.forEach((h, i) => {
        const d = new Date(h.generatedAt);
        const ds = (d.getMonth()+1) + '/' + d.getDate();
        if (i > 0) html += '<div class="mh-list-sep"></div>';
        html += `<div class="mh-list-item" onclick="renderMicroHistoryDetail(${start + i})">
          <span class="mh-date">${ds}</span>
          <span class="mh-topic">${esc(h.topic)} — ${esc(h.question)}</span>
          <span class="mh-arrow">›</span>
        </div>`;
      });
      html += '</div>';

      if (totalPages > 1) {
        html += `<div class="mh-pagination">
          <button onclick="mhPage--;renderMicroHistoryList()" ${mhPage === 0 ? 'disabled style="visibility:hidden"' : ''}>‹ 上一頁</button>
          <span class="mh-page-info">${mhPage+1} / ${totalPages}</span>
          <button onclick="mhPage++;renderMicroHistoryList()" ${mhPage >= totalPages-1 ? 'disabled style="visibility:hidden"' : ''}>下一頁 ›</button>
        </div>`;
      }
      body.innerHTML = html;
      body.scrollTop = 0;
    }

    function renderMicroHistoryDetail(idx) {
      const h = mhData[idx];
      if (!h) return;
      const body = document.querySelector('#mhDialog .mh-dialog-body');
      const d = new Date(h.generatedAt);
      const ds = d.getFullYear() + '/' + (d.getMonth()+1) + '/' + d.getDate();

      let html = `<div class="mh-detail">
        <button class="mh-back" onclick="renderMicroHistoryList()">← 返回列表</button>
        <div class="mh-detail-topic">${esc(h.topic)}</div>
        <div class="mh-detail-question">${esc(h.question)}</div>
        <div class="mh-detail-date">${ds}</div>
        <div class="mh-detail-answer">${esc(h.answer)}</div>
        ${h.further ? '<div class="mh-detail-further">' + esc(h.further) + '</div>' : ''}
      </div>`;
      body.innerHTML = html;
      body.scrollTop = 0;
    }

    init();
  </script>
  <dialog id="mhDialog" class="mh-dialog">
    <div class="mh-dialog-header">
      <span class="mh-dialog-title">過往知識卡</span>
      <button class="mh-dialog-close" onclick="document.getElementById('mhDialog').close()">&times;</button>
    </div>
    <div class="mh-dialog-body"></div>
  </dialog>

  <script>fetch('/api/version').then(r=>r.json()).then(d=>{document.getElementById('appVersion').textContent='v'+d.version}).catch(()=>{})</script>
  <script defer src="/_vercel/insights/script.js"></script>
</body>
</html>
