name: Refresh Patents

on:
  schedule:
    - cron: '0 2 * * 1'  # 每週一 02:00 UTC = 台灣時間 10:00
  workflow_dispatch:      # 手動觸發

jobs:
  refresh:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Crawl TIPO patents
        run: |
          node -e "
            const { refreshPatents } = require('./lib/patents');
            refreshPatents()
              .then(d => {
                console.log('Done:', d.total, 'patents,', d.sources.tipo, 'new');
                if (d.sources.tipo === 0) process.exit(0);
              })
              .catch(e => { console.error(e.message); process.exit(1); });
          "
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}

      - name: Commit updated cache
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/patents-cache.json
          git diff --staged --quiet && echo "No changes to commit" || git commit -m "chore: 更新專利 cache $(date +%Y-%m-%d)"
          git push

      - name: Deploy to Vercel
        run: npx vercel --token "$VERCEL_TOKEN" --prod --yes 2>&1 | tail -5
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}

      - name: Sync cache to Vercel Blob
        run: |
          sleep 30
          curl -sf "https://edtech-news.vercel.app/api/patents/import-bundled?token=$VERCEL_TOKEN" \
            | tee /dev/stderr | node -e "process.stdin.resume();process.stdin.on('data',d=>{const r=JSON.parse(d);if(!r.ok)process.exit(1);})"
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
